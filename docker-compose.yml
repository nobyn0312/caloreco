services:
  db:
    image: postgres:16-alpine
    container_name: "caloreco-postgres"
    environment:
      POSTGRES_USER: caloreco
      POSTGRES_PASSWORD: caloreco
      POSTGRES_DB: caloreco
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: "caloreco-redis"
    ports:
      - "6379:6379"

volumes:
  postgres_data:
